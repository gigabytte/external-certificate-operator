{{- if .Values.webhookService.csiDriverTLSMount.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "chart.fullname" . }}-spc
  namespace: {{ .Release.Namespace }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    keyvaultName: {{ .Values.webhookService.csiDriverTLSMount.keyvaultName }}
    clientID: {{ .Values.webhookService.csiDriverTLSMount.clientId }}
    tenantId: {{ .Values.webhookService.csiDriverTLSMount.tenantId }}
    objects: |
      array:
      {{- range .Values.webhookService.csiDriverTLSMount.akvSecretObjects }}
        - |
          objectName: {{ .objectName }}
          objectType: {{ .objectType }}
      {{- end }}
  secretObjects:
    {{- range .Values.webhookService.csiDriverTLSMount.k8sSecretObjects }}
    - secretName: {{ .secretName }}
      type: {{ .type }}
      data:
        {{- range .data }}
        - key: {{ .key }}
          objectName: {{ .objectName }}
        {{- end }}
    {{- end }}
{{- end }}
